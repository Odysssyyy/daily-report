<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontier Industry Info Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    --card-shadow-hover: 0 6px 24px rgba(0,0,0,0.13);
    --accent: #003057;
    --accent-light: #1a5276;
    --teal: #7ec8e3;
    --text-main: #1a1a2e;
    --text-sub: #6b7280;
    --text-tiny: #9ca3af;
    --new-badge: #22c55e;
    --stack-offset: 6px;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: "Noto Sans SC", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-main);
  }

  /* ── BANNER ── */
  .banner {
    background: linear-gradient(135deg, #001e3c 0%, #003057 55%, #004a80 100%);
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 110%, rgba(126,200,227,0.18) 0%, transparent 70%);
  }
  .banner-inner { position: relative; z-index: 1; }
  .banner-eyebrow {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--teal); margin-bottom: 12px; opacity: 0.9;
  }
  .banner-title {
    font-family: "Playfair Display", serif;
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -0.5px;
  }
  .banner-title span { color: var(--teal); }
  .banner-subtitle {
    font-size: 12px; color: rgba(255,255,255,0.55);
    margin-top: 10px; letter-spacing: 2px;
  }
  .banner-meta {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-top: 18px;
  }
  .banner-version {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    background: rgba(126,200,227,0.18); color: var(--teal);
    padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(126,200,227,0.3);
  }
  .banner-by {
    font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
  }

  /* ── CONTENT ── */
  .content {
    max-width: 640px; margin: 0 auto; padding: 32px 16px 60px;
  }

  /* ── MONTH GROUP ── */
  .month-group { margin-bottom: 28px; }

  .month-label {
    font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-sub); margin-bottom: 14px; padding-left: 4px;
  }

  /* ── STACK WRAPPER ── */
  .stack-wrap {
    position: relative;
    /* height managed by JS / transition */
  }

  /* ghost cards behind the top card */
  .stack-ghost {
    position: absolute;
    left: 0; right: 0;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 18px 20px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    position: relative;
    z-index: 10;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { box-shadow: var(--card-shadow-hover); }
  .card:active { transform: scale(0.99); }

  .card-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .card-icon { font-size: 26px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px; font-weight: 700; color: var(--text-main);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-date-row {
    display: flex; align-items: center; gap: 8px; margin-top: 4px;
  }
  .card-date { font-size: 12px; color: var(--text-sub); }
  .card-weekday { font-size: 11px; color: var(--text-tiny); }
  .badge-new {
    font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    background: var(--new-badge); color: #fff;
    padding: 2px 7px; border-radius: 20px; flex-shrink: 0;
  }
  .card-keywords {
    margin-top: 10px; font-size: 11px; color: var(--text-sub);
    line-height: 1.6; padding-top: 10px;
    border-top: 1px solid #f3f4f6;
  }

  /* stack-count badge on collapsed stack */
  .stack-count {
    position: absolute; top: -8px; right: 16px; z-index: 20;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    padding: 3px 9px; border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,48,87,0.35);
    transition: opacity 0.25s;
  }
  .stack-wrap.expanded .stack-count { opacity: 0; pointer-events: none; }

  /* chevron */
  .chevron {
    flex-shrink: 0; color: var(--text-tiny); font-size: 14px;
    transition: transform 0.3s; margin-top: 4px;
  }
  .stack-wrap.expanded .card:first-of-type .chevron,
  .single-card .card .chevron { display: none; }

  /* ── EXPANDED list of sub-cards ── */
  .sub-list {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s cubic-bezier(.4,0,.2,1);
  }
  .sub-list.open { max-height: 2000px; }

  .sub-card {
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    padding: 14px 18px;
    margin-top: 8px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: box-shadow 0.2s, background 0.15s;
    text-decoration: none; color: inherit;
  }
  .sub-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.11); background: #f9fafb; }
  .sub-card-icon { font-size: 20px; flex-shrink: 0; }
  .sub-card-info { flex: 1; min-width: 0; }
  .sub-card-title { font-size: 13px; font-weight: 600; color: var(--text-main); }
  .sub-card-meta {
    display: flex; align-items: center; gap: 8px; margin-top: 3px;
  }
  .sub-card-date { font-size: 11px; color: var(--text-sub); }
  .sub-card-kw { font-size: 10px; color: var(--text-tiny); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub-card-arrow { color: var(--text-tiny); font-size: 12px; flex-shrink: 0; }

  /* collapse button */
  .collapse-btn {
    display: none;
    width: 100%; margin-top: 10px;
    background: none; border: 1.5px solid #e5e7eb; border-radius: var(--radius-sm);
    padding: 9px; font-size: 12px; color: var(--text-sub);
    cursor: pointer; text-align: center;
    transition: background 0.15s, color 0.15s;
  }
  .collapse-btn:hover { background: #f3f4f6; color: var(--text-main); }
  .stack-wrap.expanded .collapse-btn { display: block; }

  /* single card (no stacking) */
  .single-card .card { cursor: default; }
  .single-card .card:hover { box-shadow: var(--card-shadow); transform: none; }

  /* loading / empty */
  .state-msg {
    text-align: center; padding: 60px 20px;
    color: var(--text-tiny); font-size: 13px;
  }
  .state-msg .icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>
<body>

<header class="banner">
  <div class="banner-inner">
    <div class="banner-eyebrow">Daily Intelligence</div>
    <div class="banner-title">Frontier Industry<br><span>Info Hub</span></div>
    <div class="banner-subtitle">硬件 · AI · 创新药 · 医疗器械及服务</div>
    <div class="banner-meta">
      <span class="banner-version">v1.0 2026</span>
      <span class="banner-by">by mozz.ai</span>
    </div>
  </div>
</header>

<div class="content" id="content">
  <div class="state-msg"><div class="icon">⏳</div>加载中...</div>
</div>

<script>
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

function weekday(d) { return WEEKDAYS[new Date(d).getDay()]; }
function monthLabel(ym) {
  const [y, m] = ym.split('-');
  return `${y}年 ${MONTH_NAMES[parseInt(m,10)-1]}`;
}

function openReport(file) {
  window.open('reports/' + file, '_blank');
}

function buildSingleCard(r, isNewest) {
  const wrap = document.createElement('div');
  wrap.className = 'single-card';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <div class="card-icon">${r.icon || '📄'}</div>
      <div class="card-info">
        <div class="card-title">${r.date} Info Report</div>
        <div class="card-date-row">
          <span class="card-date">${r.date}</span>
          <span class="card-weekday">${weekday(r.date)}</span>
          ${isNewest ? '<span class="badge-new">NEW</span>' : ''}
        </div>
      </div>
    </div>
    ${r.keywords ? `<div class="card-keywords">${r.keywords}</div>` : ''}
  `;
  card.addEventListener('click', () => openReport(r.file));
  wrap.appendChild(card);
  return wrap;
}

function buildStackGroup(reports, isNewestGroup, newestDate) {
  // reports sorted newest first
  const top = reports[0];
  const wrap = document.createElement('div');
  wrap.className = 'stack-wrap';

  // ghost cards (behind top)
  const numGhosts = Math.min(reports.length - 1, 2);
  for (let i = numGhosts; i >= 1; i--) {
    const ghost = document.createElement('div');
    ghost.className = 'stack-ghost';
    const offset = i * 6;
    ghost.style.cssText = `
      height: 80px;
      bottom: -${offset}px;
      transform: scaleX(${1 - i * 0.03});
      opacity: ${1 - i * 0.25};
      z-index: ${10 - i};
    `;
    wrap.appendChild(ghost);
  }

  // count badge
  const countBadge = document.createElement('div');
  countBadge.className = 'stack-count';
  countBadge.textContent = `${reports.length} 篇`;
  wrap.appendChild(countBadge);

  // top card (shows latest)
  const isNewest = isNewestGroup && top.date === newestDate;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <div class="card-icon">${top.icon || '📄'}</div>
      <div class="card-info">
        <div class="card-title">${top.date} Info Report</div>
        <div class="card-date-row">
          <span class="card-date">${top.date}</span>
          <span class="card-weekday">${weekday(top.date)}</span>
          ${isNewest ? '<span class="badge-new">NEW</span>' : ''}
        </div>
      </div>
      <span class="chevron">›</span>
    </div>
    ${top.keywords ? `<div class="card-keywords">${top.keywords}</div>` : ''}
  `;

  // sub-list
  const subList = document.createElement('div');
  subList.className = 'sub-list';
  reports.forEach((r, idx) => {
    const isNew = isNewestGroup && r.date === newestDate;
    const a = document.createElement('a');
    a.className = 'sub-card';
    a.href = 'reports/' + r.file;
    a.target = '_blank';
    a.innerHTML = `
      <div class="sub-card-icon">${r.icon || '📄'}</div>
      <div class="sub-card-info">
        <div class="sub-card-title">${r.date} Info Report${isNew ? ' <span class="badge-new">NEW</span>' : ''}</div>
        <div class="sub-card-meta">
          <span class="sub-card-date">${r.date} ${weekday(r.date)}</span>
          ${r.keywords ? `<span class="sub-card-kw">${r.keywords}</span>` : ''}
        </div>
      </div>
      <span class="sub-card-arrow">↗</span>
    `;
    subList.appendChild(a);
  });

  // collapse button
  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'collapse-btn';
  collapseBtn.textContent = '收起';

  // toggle logic
  let expanded = false;
  function expand() {
    expanded = true;
    wrap.classList.add('expanded');
    subList.classList.add('open');
    // hide ghost cards
    wrap.querySelectorAll('.stack-ghost').forEach(g => {
      g.style.opacity = '0'; g.style.bottom = '0';
    });
  }
  function collapse() {
    expanded = false;
    wrap.classList.remove('expanded');
    subList.classList.remove('open');
    wrap.querySelectorAll('.stack-ghost').forEach((g, i) => {
      const idx = numGhosts - i;
      g.style.opacity = `${1 - idx * 0.25}`;
      g.style.bottom = `-${idx * 6}px`;
    });
  }

  card.addEventListener('click', () => {
    if (!expanded) expand();
    else openReport(top.file);
  });
  collapseBtn.addEventListener('click', collapse);

  wrap.appendChild(card);
  wrap.appendChild(subList);
  wrap.appendChild(collapseBtn);

  // extra bottom padding for ghost cards
  if (numGhosts > 0) {
    wrap.style.marginBottom = `${numGhosts * 6 + 8}px`;
  }

  return wrap;
}

fetch('reports/index.json')
  .then(r => r.json())
  .then(reports => {
    const content = document.getElementById('content');
    content.innerHTML = '';

    if (!reports || reports.length === 0) {
      content.innerHTML = '<div class="state-msg"><div class="icon">📭</div>暂无日报</div>';
      return;
    }

    // sort all newest first
    reports.sort((a,b) => b.date.localeCompare(a.date));
    const newestDate = reports[0].date;

    // group by month
    const groups = {};
    const monthOrder = [];
    reports.forEach(r => {
      const m = r.date.substring(0, 7);
      if (!groups[m]) { groups[m] = []; monthOrder.push(m); }
      groups[m].push(r);
    });

    monthOrder.forEach((ym, gi) => {
      const grp = groups[ym];
      const isNewestGroup = gi === 0;

      const section = document.createElement('div');
      section.className = 'month-group';

      const label = document.createElement('div');
      label.className = 'month-label';
      label.textContent = monthLabel(ym);
      section.appendChild(label);

      // stack wrap
      const stackWrap = document.createElement('div');
      if (grp.length === 1) {
        stackWrap.appendChild(buildSingleCard(grp[0], isNewestGroup && grp[0].date === newestDate));
      } else {
        stackWrap.appendChild(buildStackGroup(grp, isNewestGroup, newestDate));
      }
      section.appendChild(stackWrap);
      content.appendChild(section);
    });
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<div class="state-msg"><div class="icon">⚠️</div>加载失败，请稍后刷新</div>';
  });
</script>
</body>
</html>
