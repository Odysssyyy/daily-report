<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontier Industry Info Hub · 前沿产业资讯</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  /* 数字和英文走 Helvetica，中文 fallback Noto Serif SC / Noto Sans SC */
  @font-face {
    font-family: "HelvSerifMix";
    src: local("Helvetica Neue"), local("Helvetica"), local("Arial");
    unicode-range: U+0020-007E, U+00A0-00FF, U+2000-206F, U+20A0-20CF, U+2100-214F, U+FF00-FFEF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "HelvSerifMix", "Noto Sans SC", "PingFang SC", Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── BANNER ── */
  .banner {
    position: relative;
    width: 100%;
    height: 260px;
    background: #002847;
    overflow: hidden;
  }

  /* 网格线背景 */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,160,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,160,255,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* 光晕 */
  .banner::after {
    content: '';
    position: absolute;
    top: -80px;
    right: -60px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,120,255,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .banner-inner {
    position: relative;
    z-index: 2;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 32px 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-bottom: 28px;
  }

  .banner-top {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* 装饰线 */
  .banner-accent {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .banner-accent-line {
    width: 28px;
    height: 2px;
    background: #00aaff;
    border-radius: 2px;
  }
  .banner-accent-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #00aaff;
  }
  .banner-accent-label {
    font-family: "HelvSerifMix", "Noto Serif SC", Georgia, serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    color: #00aaff;
    text-transform: uppercase;
  }

  .banner-title-en {
    font-family: "Playfair Display", "Noto Serif SC", Georgia, serif;
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .banner-title-zh {
    font-family: "Noto Serif SC", Georgia, serif;
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    letter-spacing: 3px;
    margin-top: 8px;
  }

  .banner-byline {
    font-family: "HelvSerifMix", "Noto Serif SC", Georgia, serif;
    font-size: 12px;
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    margin-top: 6px;
  }

  .banner-bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .banner-version {
    font-family: "HelvSerifMix", "Noto Serif SC", Georgia, serif;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1.5px;
  }

  /* 右侧装饰圆圈 */
  .banner-deco {
    position: absolute;
    right: 80px;
    bottom: 20px;
    z-index: 1;
    opacity: 0.12;
  }

  /* 标签栏 */
  .tags-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tag-chip {
    font-family: "HelvSerifMix", "Noto Serif SC", Georgia, serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 3px 10px;
  }

  /* ── MAIN ── */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .report-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* 原始单卡样式（供 sub-card 复用）*/
  .report-item a {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 16px 20px;
    background: #fff;
    border-radius: 12px;
    text-decoration: none;
    color: #1a1a1a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid #eee;
    transition: box-shadow .15s, border-color .15s;
  }
  .report-item a:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    border-color: #cce4ff;
  }

  .ri-icon {
    font-size: 20px;
    margin-right: 14px;
    flex-shrink: 0;
  }

  .ri-body {
    flex: 1;
    min-width: 0;
  }

  .ri-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ri-sub {
    font-size: 11px;
    color: #aaa;
    margin-top: 2px;
  }

  .ri-date {
    font-family: "HelvSerifMix", "Noto Serif SC", Georgia, serif;
    font-size: 11px;
    color: #bbb;
    flex-shrink: 0;
    margin-left: 16px;
  }

  .ri-new {
    font-size: 9px;
    font-weight: 600;
    background: #e8f5e9;
    color: #2e7d32;
    border-radius: 4px;
    padding: 2px 6px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }

  /* ── STACK (月份堆叠) ── */
  .stack-item {
    position: relative;
  }

  /* 叠放的影子卡片（最多2层） */
  .stack-ghost {
    position: absolute;
    left: 4px; right: 4px;
    height: 52px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #eee;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s, bottom 0.35s;
  }
  .stack-ghost.g1 { bottom: -6px; opacity: 0.7; z-index: 1; }
  .stack-ghost.g2 { left: 8px; right: 8px; bottom: -11px; opacity: 0.4; z-index: 0; }

  /* 展开时隐藏鬼牌 */
  .stack-item.expanded .stack-ghost { opacity: 0 !important; bottom: 0 !important; }

  /* 计数徽章 */
  .stack-badge {
    position: absolute;
    top: -7px; right: 14px;
    z-index: 20;
    background: #002847;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 2px 8px;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(0,40,71,0.3);
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .stack-item.expanded .stack-badge { opacity: 0; }

  /* 顶部卡片（最新一篇），可点击展开 */
  .stack-top {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 16px 20px;
    background: #fff;
    border-radius: 12px;
    text-decoration: none;
    color: #1a1a1a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid #eee;
    cursor: pointer;
    position: relative;
    z-index: 10;
    transition: box-shadow .15s, border-color .15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .stack-top:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-color: #cce4ff; }

  .stack-chevron {
    flex-shrink: 0;
    margin-left: 12px;
    font-size: 13px;
    color: #bbb;
    transition: transform 0.3s;
  }
  .stack-item.expanded .stack-chevron { transform: rotate(90deg); }

  /* 展开后的子卡片列表 */
  .stack-sub-list {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 0;
  }
  .stack-item.expanded .stack-sub-list {
    max-height: 2000px;
    padding-top: 8px;
  }

  /* 收起按钮 */
  .stack-collapse {
    display: none;
    width: 100%;
    margin-top: 4px;
    background: none;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 8px;
    font-size: 11px;
    color: #aaa;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .stack-collapse:hover { background: #f3f4f6; color: #555; }
  .stack-item.expanded .stack-collapse { display: block; }

  /* 月份标签 */
  .month-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #bbb;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 4px;
    padding-left: 2px;
  }

  /* ── 移动端适配 ── */
  @media (max-width: 480px) {
    .banner {
      height: auto;
      min-height: 220px;
    }
    .banner-inner {
      padding: 32px 20px 22px;
      gap: 20px;
    }
    .banner-title-en {
      font-size: 22px;
      letter-spacing: -0.3px;
    }
    .banner-title-zh {
      font-size: 13px;
      letter-spacing: 2px;
    }
    .banner-byline {
      font-size: 11px;
    }
    .banner-bottom {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .tags-bar {
      flex-wrap: wrap;
      gap: 6px;
    }
    .banner-deco {
      width: 160px;
      height: 160px;
      right: -20px;
      bottom: 10px;
      opacity: 0.08;
    }
    .main {
      padding: 22px 16px 48px;
    }
    .report-item a, .stack-top {
      padding: 13px 14px;
    }
    .ri-title {
      font-size: 13px;
      white-space: normal;
    }
    .ri-sub {
      font-size: 10px;
      white-space: normal;
      word-break: break-all;
    }
  }
</style>
</head>
<body>

<!-- Banner -->
<div class="banner">
  <svg class="banner-deco" width="280" height="280" viewBox="0 0 280 280" fill="none">
    <circle cx="140" cy="140" r="135" stroke="white" stroke-width="1"/>
    <circle cx="140" cy="140" r="100" stroke="white" stroke-width="0.5"/>
    <circle cx="140" cy="140" r="65" stroke="white" stroke-width="0.5"/>
    <circle cx="140" cy="140" r="30" stroke="white" stroke-width="1"/>
    <line x1="5" y1="140" x2="275" y2="140" stroke="white" stroke-width="0.5"/>
    <line x1="140" y1="5" x2="140" y2="275" stroke="white" stroke-width="0.5"/>
    <circle cx="140" cy="140" r="4" fill="white"/>
  </svg>

  <div class="banner-inner">
    <div class="banner-top">
      <div class="banner-accent">
        <div class="banner-accent-dot"></div>
        <div class="banner-accent-line"></div>
        <div class="banner-accent-label">Industry Intelligence</div>
      </div>
      <div class="banner-title-en">Frontier Industry Info Hub</div>
      <div class="banner-title-zh">前沿产业资讯</div>
      <div class="banner-byline">by mozz.ai</div>
    </div>

    <div class="banner-bottom">
      <div class="banner-version">v1.0 2026</div>
      <div class="tags-bar">
        <span class="tag-chip">硬件</span>
        <span class="tag-chip">AI</span>
        <span class="tag-chip">创新药</span>
        <span class="tag-chip">医疗器械及服务</span>
      </div>
    </div>
  </div>
</div>

<!-- 归档列表 -->
<div class="main">
  <div class="section-label">Feeds:</div>
  <ul class="report-list" id="report-list">
    <li style="color:#bbb;font-size:13px;padding:20px 0">加载中...</li>
  </ul>
</div>

<script>
const WEEKDAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = {
  '01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun',
  '07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'
};

function weekday(d) { return WEEKDAYS[new Date(d + 'T00:00:00').getDay()]; }
function fmtDate(d) {
  const [,m,day] = d.split('-');
  return MONTH_NAMES[m] + ' ' + parseInt(day, 10);
}
function monthKey(d) { return d.substring(0, 7); } // "2026-04"
function monthDisplay(ym) {
  const [y, m] = ym.split('-');
  return MONTH_NAMES[m] + ' ' + y;
}

// 构建单条卡片（<a> 行）
function buildCardRow(r, isNew) {
  const a = document.createElement('a');
  a.href = r.file;
  a.target = '_blank';
  a.innerHTML = `
    <div class="ri-icon">${r.icon || '📄'}</div>
    <div class="ri-body">
      <div class="ri-title">${r.date} Info Report${isNew ? ' <span class="ri-new">NEW</span>' : ''}</div>
      <div class="ri-sub">${r.keywords || ''}</div>
    </div>
    <div class="ri-date">${fmtDate(r.date)} ${weekday(r.date)}</div>
  `;
  return a;
}

// 构建单月堆叠组（reports 已按日期倒序，defaultExpanded 控制初始状态）
function buildMonthGroup(reports, newestDate, defaultExpanded) {
  const li = document.createElement('li');
  li.className = 'stack-item';

  const top = reports[0];
  const isTopNew = top.date === newestDate;

  // 鬼牌（单篇也显示1层，多篇最多2层，已展开时隐藏）
  const numGhosts = reports.length === 1 ? 1 : Math.min(reports.length - 1, 2);
  for (let i = numGhosts; i >= 1; i--) {
    const g = document.createElement('div');
    g.className = 'stack-ghost g' + i;
    li.appendChild(g);
  }

  // 计数徽章（单篇也显示，多篇显示数量）
  const badge = document.createElement('div');
  badge.className = 'stack-badge';
  badge.textContent = reports.length === 1 ? '1 篇' : reports.length + ' 篇';
  li.appendChild(badge);

  // 顶部卡片（可展开）
  const topCard = document.createElement('div');
  topCard.className = 'stack-top';
  topCard.innerHTML = `
    <div class="ri-icon">${top.icon || '📄'}</div>
    <div class="ri-body">
      <div class="ri-title">${top.date} Info Report${isTopNew ? ' <span class="ri-new">NEW</span>' : ''}</div>
      <div class="ri-sub">${top.keywords || ''}</div>
    </div>
    <div class="ri-date">${fmtDate(top.date)} ${weekday(top.date)}</div>
    <span class="stack-chevron">›</span>
  `;

  // 展开列表（子卡片，跳过第0篇，顶部卡已代表它）
  const subList = document.createElement('div');
  subList.className = 'stack-sub-list';
  reports.slice(1).forEach(r => {
    const subLi = document.createElement('div');
    subLi.className = 'report-item';
    subLi.appendChild(buildCardRow(r, r.date === newestDate));
    subList.appendChild(subLi);
  });

  // 收起按钮
  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'stack-collapse';
  collapseBtn.textContent = '收起';

  let expanded = false;
  function doExpand() {
    expanded = true;
    li.classList.add('expanded');
  }
  function doCollapse() {
    expanded = false;
    li.classList.remove('expanded');
  }

  topCard.addEventListener('click', () => {
    if (!expanded) {
      if (reports.length === 1) {
        // 单篇：展开只是去掉鬼牌视觉，顶卡点击直接打开
        window.open(top.file, '_blank');
      } else {
        doExpand();
      }
    } else {
      // 已展开时点顶卡 → 打开最新报告
      window.open(top.file, '_blank');
    }
  });
  collapseBtn.addEventListener('click', doCollapse);

  li.appendChild(topCard);
  li.appendChild(subList);
  li.appendChild(collapseBtn);

  // 鬼牌底部留白
  li.style.marginBottom = (numGhosts * 6) + 'px';

  // 默认展开
  if (defaultExpanded) doExpand();

  return li;
}

// 读取 JSON，渲染
fetch('index.json')
  .then(r => r.json())
  .then(reports => {
    const list = document.getElementById('report-list');
    list.innerHTML = '';

    if (!reports || reports.length === 0) {
      list.innerHTML = '<li style="color:#bbb;font-size:13px;padding:20px 0">暂无日报</li>';
      return;
    }

    // 全局最新日期 & 当前月份
    reports.sort((a, b) => b.date.localeCompare(a.date));
    const newestDate = reports[0].date;
    const currentMonth = new Date().toISOString().substring(0, 7); // "2026-04"

    // 按月分组
    const groups = {};
    const monthOrder = [];
    reports.forEach(r => {
      const m = monthKey(r.date);
      if (!groups[m]) { groups[m] = []; monthOrder.push(m); }
      groups[m].push(r);
    });

    monthOrder.forEach(ym => {
      // 月份标签
      const labelLi = document.createElement('li');
      labelLi.className = 'month-label';
      labelLi.textContent = monthDisplay(ym);
      list.appendChild(labelLi);

      // 所有月份默认折叠
      list.appendChild(buildMonthGroup(groups[ym], newestDate, false));
    });
  })
  .catch(() => {
    document.getElementById('report-list').innerHTML =
      '<li style="color:#bbb;font-size:13px;padding:20px 0">加载失败，请稍后刷新</li>';
  });
</script>

</body>
</html>
